version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: skillhub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "5173:5173"  # Pour le développement
    environment:
      - VITE_API_URL=http://localhost:8000/api
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge