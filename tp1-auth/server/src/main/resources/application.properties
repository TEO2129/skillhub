server.port=8080

# Base H2 en memoire pour dev
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.jpa.open-in-view=false

# Logging
logging.file.name=logs/auth-server.log
logging.level.com.example.auth=DEBUG

# =============================================
# Master Key JWT - cle secrete pour signer les tokens
# Doit faire au moins 256 bits (32 caracteres)
# =============================================
jwt.secret=SkillHubMasterKey2026!SecretJWTKey256BitsMinimum
jwt.expiration=86400000